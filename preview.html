<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Mall Header Preview</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Mock Context Path */
        :root {
            --primary-color: #1A7A42;
            --primary-dark: #125c31;
            --accent-color: #EF4444;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
            --white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --shadow-premium: 0 10px 30px -5px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            min-height: 200vh; /* For scroll testing */
        }

        .top-header {
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 13px;
            padding: 10px 0;
            font-weight: 500;
        }

        .top-header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        .top-header-left, .top-header-right, .top-header-right > div {
            display: flex !important;
            align-items: center !important;
            flex-direction: row !important;
        }

        .top-header a, .top-header-item, .top-header-item > a {
            display: flex !important;
            align-items: center !important;
            white-space: nowrap !important;
            color: rgba(255, 255, 255, 0.9) !important;
            text-decoration: none !important;
        }

        .top-header a:hover, .top-header-item:hover > a {
            color: #fff !important;
            opacity: 1 !important;
        }

        .top-header-left > *:not(:last-child), 
        .top-header-right > *:not(:last-child) {
            margin-right: 18px;
        }

        .top-header-item {
            position: relative;
            display: flex;
            align-items: center;
        }

        .header-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-premium);
            padding: 18px 0;
            transition: var(--transition);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .header-container .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            gap: 50px;
        }

        .header-container.sticky {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 2000;
            padding: 12px 0;
            background: white;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .logo-section a {
            font-size: 30px;
            font-weight: 800;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -1.5px;
        }

        .logo-section .mall-box {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: normal;
            box-shadow: 0 4px 15px rgba(26, 122, 66, 0.2);
        }

        .search-section {
            flex: 1;
            max-width: 850px;
        }

        .search-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 14px 28px;
            padding-right: 5rem;
            border: 2px solid #f1f5f9;
            border-radius: 50px;
            background-color: #f8fafc;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }

        .search-input:focus {
            background-color: var(--white);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(26, 122, 66, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 4px;
            top: 4px;
            bottom: 4px;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .cart-section {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .cart-icon-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
            width: 60px;
        }

        .cart-icon-wrapper:hover {
            color: var(--primary-color) !important;
            transform: translateY(-3px);
        }

        .cart-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .cart-badge {
            position: absolute;
            top: -10px;
            right: 8px;
            background: var(--accent-color);
            color: white;
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 50px;
            font-weight: 800;
            border: 3px solid var(--white);
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
        }

        .notification-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            width: max-content;
            min-width: 220px;
            white-space: nowrap;
            background: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-radius: 6px;
            margin-top: 12px;
            display: none;
            z-index: 9999;
            border: 1px solid #eee;
        }

        .noti-content a {
            padding: 12px 20px !important;
            display: flex !important;
            align-items: center;
            color: #333 !important;
            text-decoration: none;
        }

        .noti-content a:hover {
            background: #f8fafc;
        }
    </style>
</head>
<body>

<header>
    <nav class="top-header">
        <div class="container">
            <div class="top-header-left">
                <a href="#">Kênh người bán</a>
                <span class="mx-2" style="opacity: 0.3;">|</span>
                <a href="#"><i class="fab fa-facebook me-1"></i>Kết nối</a>
            </div>
            
            <div class="top-header-right">
                <a href="#" class="me-3"><i class="fas fa-question-circle me-1"></i>Hỗ trợ</a>
                
                <div class="top-header-item me-3">
                    <a href="javascript:void(0)" id="langTrigger">
                        <i class="fas fa-globe me-1"></i>Tiếng Việt <i class="fas fa-chevron-down ms-1" style="font-size: 0.7rem;"></i>
                    </a>
                    <div class="notification-dropdown" id="langDropdown">
                        <div class="noti-content">
                            <a href="#">Tiếng Việt</a>
                            <a href="#">Tiếng Anh</a>
                        </div>
                    </div>
                </div>

                <span class="me-3" style="opacity: 0.3;">|</span>

                <div class="d-flex align-items-center">
                    <div class="top-header-item me-3">
                        <a href="javascript:void(0)" id="notificationTrigger">
                            <i class="fas fa-bell me-1"></i> Thông báo
                        </a>
                        <div class="notification-dropdown" id="notificationDropdown">
                            <div class="noti-content">
                                <div style="padding: 20px; text-align: center; color: #999;">Chưa có thông báo nào</div>
                            </div>
                        </div>
                    </div>
                    
                    <span class="me-3" style="opacity: 0.3;">|</span>

                    <div class="top-header-item">
                        <a href="javascript:void(0)" id="profileTrigger">
                            <i class="fas fa-user-circle me-1"></i> Tài khoản
                        </a>
                        <div class="notification-dropdown" id="profileDropdown">
                            <div class="noti-content">
                                <a href="#">
                                    <i class="fas fa-user-edit me-2"></i> Xem trang cá nhân
                                </a>
                                <div style="height: 1px; background: #eee; margin: 4px 0;"></div>
                                <a href="#" style="color: #ef4444 !important;">
                                    <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="header-container" id="mainHeader">
        <div class="container">
            <div class="logo-section">
                <a href="#">S<span class="mall-box">Mall</span></a>
            </div>
            
            <div class="search-section">
                <form action="#" class="search-group">
                    <input type="text" class="search-input" placeholder="Tìm kiếm sản phẩm, thương hiệu...">
                    <button type="submit" class="search-btn">
                        <i class="fa fa-search"></i>
                    </button>
                </form>
            </div>

            <div class="cart-section">
                <a href="#" class="cart-icon-wrapper">
                    <i class="fas fa-comment-dots cart-icon"></i>
                    <span style="font-size: 14px; font-weight: 500;">Chat</span>
                    <span class="cart-badge">0</span>
                </a>
                <a href="#" class="cart-icon-wrapper">
                    <i class="fa fa-shopping-cart cart-icon"></i>
                    <span style="font-size: 14px; font-weight: 500;">Giỏ hàng</span>
                    <span class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </div>
</header>

<div style="padding: 100px; text-align: center; color: #64748B;">
    <h1>Cuộn xuống để thử hiệu ứng Sticky Header</h1>
    <p>Giao diện này đã được giả lập từ file JSP để bạn xem nhanh.</p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            header.classList.add('sticky');
        } else {
            header.classList.remove('sticky');
        }
    });

    const setupDropdown = (triggerId, dropdownId) => {
        const trigger = document.getElementById(triggerId);
        const dropdown = document.getElementById(dropdownId);
        if (trigger && dropdown) {
            trigger.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                document.querySelectorAll('.notification-dropdown').forEach(d => {
                    if (d !== dropdown) d.style.display = 'none';
                });
                dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
            });
        }
    };
    setupDropdown('notificationTrigger', 'notificationDropdown');
    setupDropdown('profileTrigger', 'profileDropdown');
    setupDropdown('langTrigger', 'langDropdown');
    
    document.addEventListener('click', function(e) {
        document.querySelectorAll('.notification-dropdown').forEach(d => {
            if (!d.contains(e.target)) d.style.display = 'none';
        });
    });
});
</script>
</body>
</html>
